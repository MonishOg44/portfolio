<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Monish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg:     #0b0f19;
            --card:   rgba(19, 27, 46, 0.75);
            --accent: #e63946;
            --text:   #f8fafc;
            --muted:  #94a3b8;
            --border: rgba(255,255,255,0.08);
            --input:  rgba(255,255,255,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* Animated background removed */

        /* Dot grid */
        .bg-dots {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
            background-size: 36px 36px;
        }

        /* ── Layout ── */
        .login-wrapper {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ── Card ── */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.75rem 2.5rem;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
            opacity: 0;
            transform: translateY(24px);
            animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Shake on error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-10px); }
            40%       { transform: translateX(10px); }
            60%       { transform: translateX(-6px); }
            80%       { transform: translateX(6px); }
        }

        .login-card.shake {
            animation: shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97) both;
        }

        /* ── Card header ── */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .lock-icon {
            width: 60px; height: 60px;
            background: var(--accent);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            font-size: 1.4rem;
            color: #fff;
            box-shadow: 0 8px 30px rgba(230,57,70,0.35);
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.35rem;
        }

        .card-subtitle {
            font-size: 0.82rem;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        /* ── Form fields ── */
        .field {
            margin-bottom: 1.1rem;
        }

        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 0.85rem;
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .input-wrapper input {
            width: 100%;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem 3rem 0.8rem 2.75rem;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            background: rgba(230,57,70,0.04);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i:first-child {
            color: var(--accent);
        }

        .toggle-pw {
            position: absolute;
            right: 18px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.88rem;
            padding: 0;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: color 0.2s ease;
            z-index: 5;
        }

        .toggle-pw:hover { color: var(--text); }
        .toggle-pw:focus { outline: none; }

        /* ── Error message ── */
        .error-msg {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(230,57,70,0.1);
            border: 1px solid rgba(230,57,70,0.25);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            font-size: 0.82rem;
            color: #fda4af;
            margin-bottom: 1.1rem;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .error-msg.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* ── Submit button ── */
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 24px rgba(230,57,70,0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(230,57,70,0.45);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login .btn-inner {
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        }

        /* ── Footer tag ── */
        .login-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        /* ── Success overlay ── */
        .success-overlay {
            position: fixed; inset: 0; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .success-check {
            width: 80px; height: 80px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
            box-shadow: 0 0 48px rgba(230,57,70,0.5);
            margin-bottom: 1.5rem;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s;
        }

        .success-overlay.show .success-check { transform: scale(1); }

        .success-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease 0.35s, transform 0.4s ease 0.35s;
        }

        .success-overlay.show .success-text { opacity: 1; transform: translateY(0); }

        /* ── Shutter Transition overlay ── */
        #page-transition {
            position: fixed;
            inset: 0;
            background: #0b0f19;
            z-index: 99995;
            pointer-events: none;
            transform: translateY(0); /* starts closed */
            transition: transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }
        #page-transition.exit {
            transform: translateY(-100%);
        }
        #page-transition.active {
            transform: translateY(0);
            pointer-events: auto;
        }

        /* ── Exit animation for card ── */
        .login-card {
            transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1), transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .login-card.exit {
            opacity: 0 !important;
            transform: scale(0.9) !important;
        }

        /* ── Shake validation animation for individual fields ── */
        .field {
            transition: transform 0.2s ease;
        }
        .field.shake .input-wrapper {
            animation: fieldShake 0.45s cubic-bezier(.36,.07,.19,.97) both;
            border-color: var(--accent) !important;
            box-shadow: 0 0 14px rgba(230,57,70,0.3) !important;
        }
        @keyframes fieldShake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* ── Back to Site Link ── */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            text-decoration: none;
            margin-top: 0.8rem;
            font-weight: 600;
            transition: color 0.2s ease, opacity 0.2s ease;
            opacity: 0.6;
        }
        .back-link:hover {
            color: var(--accent);
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- Shutter Page Transition -->
<div id="page-transition"></div>

<!-- Animated BG (Orbs Removed) -->
<div class="bg-dots"></div>

<!-- Success Overlay -->
<div class="success-overlay" id="success-overlay">
    <div class="success-check"><i class="fa-solid fa-unlock-keyhole"></i></div>
    <div class="success-text">Access Granted</div>
</div>

<!-- Login Card -->
<div class="login-wrapper">
    <div class="login-card" id="login-card">

        <div class="card-header">
            <div class="lock-icon"><i class="fa-solid fa-lock"></i></div>
            <h1 class="card-title">Admin Access</h1>
            <p class="card-subtitle">Protected area — authorised personnel only</p>
        </div>

        <form id="login-form" novalidate>

            <div class="error-msg" id="error-msg">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-text">Invalid credentials. Please try again.</span>
            </div>

            <div class="field">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Enter username" autocomplete="username" autofocus>
                </div>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
                <span class="btn-inner" id="btn-inner">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </span>
            </button>
        </form>

        <p class="login-footer">
            monish.dev &bull; admin panel &bull; 2026<br>
            <a href="index.html" class="back-link" id="back-link"><i class="fa-solid fa-arrow-left-long"></i> Back to Site</a>
        </p>
    </div>
</div>

<script>
    /* ── Credentials ── */
    var VALID_USER = 'monish';
    var VALID_PASS = 'monishgt25';
    var SESSION_KEY = 'adminAuth';

    /* Already logged in? Skip straight to admin */
    if (sessionStorage.getItem(SESSION_KEY) === 'true') {
        window.location.replace('admin.html');
    }

    /* Page entry shutter slide out */
    function initShutter() {
        var pt = document.getElementById('page-transition');
        if (pt) {
            pt.classList.remove('active');
            pt.classList.add('exit');
        }
    }

    window.addEventListener('DOMContentLoaded', function () {
        setTimeout(initShutter, 80);
    });

    window.addEventListener('pageshow', function () {
        setTimeout(initShutter, 80);
    });

    /* Back to Site link shutter slide in */
    var backLink = document.getElementById('back-link');
    if (backLink) {
        backLink.addEventListener('click', function (e) {
            e.preventDefault();
            var pt = document.getElementById('page-transition');
            if (pt) {
                pt.classList.remove('exit');
            }
            setTimeout(function () {
                window.location.href = 'index.html';
            }, 600);
        });
    }

    /* Toggle password visibility */
    document.getElementById('toggle-pw').addEventListener('click', function () {
        var inp  = document.getElementById('password');
        var icon = document.getElementById('eye-icon');
        if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'fa-solid fa-eye-slash';
        } else {
            inp.type = 'password';
            icon.className = 'fa-solid fa-eye';
        }
    });

    /* Login form submit */
    document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();

        var usernameInput = document.getElementById('username');
        var passwordInput = document.getElementById('password');

        var user = usernameInput.value.trim();
        var pass = passwordInput.value;
        var card = document.getElementById('login-card');
        var err  = document.getElementById('error-msg');
        var errText = document.getElementById('error-text');
        var btn  = document.getElementById('btn-inner');

        /* Clear previous error immediately on new submit */
        err.classList.remove('visible');

        /* Reset shaking inputs */
        document.querySelectorAll('.field').forEach(function(f) {
            f.classList.remove('shake');
        });

        /* Empty validations (with individual shakes) */
        if (!user) {
            var field = usernameInput.closest('.field');
            field.classList.add('shake');
            field.addEventListener('animationend', function() {
                field.classList.remove('shake');
            }, { once: true });

            errText.textContent = "Authentication failed. Username required.";
            err.classList.add('visible');
            usernameInput.focus();
            return;
        }

        if (!pass) {
            var field = passwordInput.closest('.field');
            field.classList.add('shake');
            field.addEventListener('animationend', function() {
                field.classList.remove('shake');
            }, { once: true });

            errText.textContent = "Authentication failed. Password required.";
            err.classList.add('visible');
            passwordInput.focus();
            return;
        }

        /* Loading state */
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';

        setTimeout(function () {
            if (user === VALID_USER && pass === VALID_PASS) {
                /* ✅ Correct — show success and redirect */
                sessionStorage.setItem(SESSION_KEY, 'true');
                err.classList.remove('visible');

                /* Card shrink exit transition */
                card.classList.add('exit');

                /* Show success screen overlay */
                var overlay = document.getElementById('success-overlay');
                overlay.classList.add('show');

                /* Slide shutter down in preparation for loading admin */
                setTimeout(function () {
                    var pt = document.getElementById('page-transition');
                    if (pt) pt.classList.remove('exit');
                }, 800);

                setTimeout(function () {
                    window.location.replace('admin.html');
                }, 1400);

            } else {
                /* ❌ Wrong — shake card + show error */
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
                errText.textContent = "Invalid credentials. Please try again.";
                err.classList.add('visible');

                card.classList.remove('shake');
                void card.offsetWidth; /* trigger reflow */
                card.classList.add('shake');

                /* Reset shake class after animation */
                card.addEventListener('animationend', function () {
                    card.classList.remove('shake');
                }, { once: true });
            }
        }, 700);
    });

    /* Clear error message immediately when user starts typing */
    var clearErr = function () {
        document.getElementById('error-msg').classList.remove('visible');
    };
    document.getElementById('username').addEventListener('input', clearErr);
    document.getElementById('password').addEventListener('input', clearErr);
</script>

</body>
</html>
